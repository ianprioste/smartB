services:
  postgres:
    image: postgres:16-alpine
    container_name: salespanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: salespanel
      POSTGRES_PASSWORD: salespanel
      POSTGRES_DB: salespanel
    ports:
      - "5433:5432"
    volumes:
      - salespanel_pg_data:/var/lib/postgresql/data

volumes:
  salespanel_pg_data:
