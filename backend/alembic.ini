[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetime.datetime.now().astimezone() to select
# an alternate timezone. leave blank for localtime.
# timezone =

# max length of characters to apply to the
# "slug" field if truncating unnamed migrations
# set to 0 to disable truncating.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to permit autogeneration of constraint names, e.g. fk0001002001,
# instead of unpredictable names
# naming_convention =

# By default, revision files
# are written as revision identifiers separated from the file name
# by one or more underscores. The default value of 1 results in revision files
# named like ``1727260032_add something.py``.

# set this to 'true' to compare type from different databases more accurately
# when detecting changes (added in Alembic 1.4)
# compare_type = false

# compare server default when detecting changes (added in Alembic 1.4)
# compare_server_default = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
