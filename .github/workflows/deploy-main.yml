name: Deploy Production (production)

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            BACKEND_SERVICE="${{ secrets.VPS_BACKEND_SERVICE || 'smartbling-backend' }}"
            DEPLOY_BRANCH="production"

            if [ -z "$APP_DIR" ]; then
              echo "VPS_APP_DIR nao configurado"
              exit 1
            fi

            REPO_URL="${{ secrets.VPS_REPO_URL }}"
            if [ -z "$REPO_URL" ]; then
              REPO_URL="git@github.com:${{ github.repository }}.git"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Diretorio nao encontrado. Clonando repositorio..."
              mkdir -p "$APP_DIR"
              git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            # If server has local manual edits, stash them to allow clean pull/deploy.
            if [ -n "$(git status --porcelain)" ]; then
              git stash push -u -m "auto-stash before deploy $(date '+%Y-%m-%d %H:%M:%S')"
            fi

            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi

            ./.venv/bin/pip install -r backend/requirements.txt

            cd frontend
            npm ci
            npm run build
            cd ..

            if command -v systemctl >/dev/null 2>&1; then
              systemctl restart "$BACKEND_SERVICE" || true
              systemctl reload nginx || true
            fi

            curl --fail --retry 5 --retry-delay 3 http://127.0.0.1:8000/health
