name: Deploy Production (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VPS_HOST: 191.252.204.67
      VPS_USER: root
      VPS_APP_DIR: /opt/smartB

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -Eeuo pipefail
            cd "${{ env.VPS_APP_DIR }}"
            chmod +x deploy.sh
            ./deploy.sh main
