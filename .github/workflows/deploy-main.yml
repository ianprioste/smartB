name: Deploy Production (production)

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PUBLIC_HOST: 191.252.204.67
      BUILD_ID: run-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Prepare SSH key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh

          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Secret VPS_SSH_KEY vazio"
            exit 1
          fi

          KEY_RAW="$VPS_SSH_KEY"

          # Remove optional surrounding quotes added accidentally when copying secrets.
          if [[ ${KEY_RAW:0:1} == '"' && ${KEY_RAW: -1} == '"' ]]; then
            KEY_RAW="${KEY_RAW:1:${#KEY_RAW}-2}"
          fi
          if [[ ${KEY_RAW:0:1} == "'" && ${KEY_RAW: -1} == "'" ]]; then
            KEY_RAW="${KEY_RAW:1:${#KEY_RAW}-2}"
          fi

          KEY_OK=0

          # Try 1: secret already in proper multiline format.
          printf '%s' "$KEY_RAW" > ~/.ssh/deploy_key
          sed -i 's/\r$//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            KEY_OK=1
          fi

          # Try 2: secret pasted as single line with escaped newlines.
          if [ "$KEY_OK" -eq 0 ]; then
            printf '%b' "$KEY_RAW" > ~/.ssh/deploy_key
            sed -i 's/\r$//' ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
              KEY_OK=1
            fi
          fi

          # Try 3: secret stored as base64 of private key content.
          if [ "$KEY_OK" -eq 0 ]; then
            if printf '%s' "$KEY_RAW" | base64 -d > ~/.ssh/deploy_key 2>/dev/null; then
              sed -i 's/\r$//' ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
              if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
                KEY_OK=1
              fi
            fi
          fi

          if [ "$KEY_OK" -eq 0 ]; then
            echo "VPS_SSH_KEY invalida: use a chave privada completa (BEGIN/END), sem markdown e sem senha."
            exit 1
          fi

          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        id: deploy_ssh
        continue-on-error: true
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_BACKEND_SERVICE: ${{ secrets.VPS_BACKEND_SERVICE || 'smartbling-backend' }}
          VPS_FRONTEND_DIR: ${{ secrets.VPS_FRONTEND_DIR || '/usr/share/nginx/html' }}
          VPS_REPO_URL: ${{ secrets.VPS_REPO_URL }}
          BACKEND_ENV_B64: ${{ secrets.BACKEND_ENV_B64 }}
          DEPLOY_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY || secrets.SECRET_KEY }}
          DEPLOY_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL || secrets.DATABASE_URL }}
          DEPLOY_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS || secrets.CORS_ORIGINS }}
          DEPLOY_BLING_CLIENT_ID: ${{ secrets.BACKEND_BLING_CLIENT_ID || secrets.BLING_CLIENT_ID }}
          DEPLOY_BLING_CLIENT_SECRET: ${{ secrets.BACKEND_BLING_CLIENT_SECRET || secrets.BLING_CLIENT_SECRET }}
          DEPLOY_BLING_REDIRECT_URI: ${{ secrets.BACKEND_BLING_REDIRECT_URI || secrets.BLING_REDIRECT_URI }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          BUILD_ID: ${{ env.BUILD_ID }}
          PUBLIC_HOST: ${{ env.PUBLIC_HOST }}
        run: |
          set -Eeuo pipefail
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' VPS_BACKEND_SERVICE='$VPS_BACKEND_SERVICE' VPS_FRONTEND_DIR='$VPS_FRONTEND_DIR' VPS_REPO_URL='$VPS_REPO_URL' BACKEND_ENV_B64='$BACKEND_ENV_B64' GITHUB_REPOSITORY='$GITHUB_REPOSITORY' GIT_COMMIT='$GITHUB_SHA' BUILD_ID='$BUILD_ID' BUILD_TIMESTAMP='$(date -u '+%Y-%m-%dT%H:%M:%SZ')' PUBLIC_HOST='$PUBLIC_HOST' bash -se" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail
          APP_DIR="${VPS_APP_DIR:-/opt/smartB}"
          BACKEND_SERVICE="${VPS_BACKEND_SERVICE:-smartbling-backend}"
          FRONTEND_TARGET_DIR="${VPS_FRONTEND_DIR:-/usr/share/nginx/html}"
          DEPLOY_BRANCH="production"
          REPO_URL="${VPS_REPO_URL:-https://github.com/${GITHUB_REPOSITORY}.git}"

          # Secrets can accidentally contain leading/trailing spaces.
          APP_DIR="$(printf '%s' "$APP_DIR" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Diretorio nao encontrado. Clonando repositorio..."
            mkdir -p "$APP_DIR"
            git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git remote set-url origin "$REPO_URL"

          if [ -n "$(git status --porcelain)" ]; then
            git stash push -u -m "auto-stash before deploy $(date '+%Y-%m-%d %H:%M:%S')"
          fi

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"
          APP_DIR="$APP_DIR" BACKEND_SERVICE="$BACKEND_SERVICE" FRONTEND_TARGET_DIR="$FRONTEND_TARGET_DIR" GIT_COMMIT="$GIT_COMMIT" BUILD_ID="$BUILD_ID" BUILD_TIMESTAMP="$BUILD_TIMESTAMP" PUBLIC_HOST="$PUBLIC_HOST" \
            bash scripts/deploy-vps.sh
          REMOTE_SCRIPT

      - name: Verify Public Rollout
        if: always()
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          PUBLIC_HOST: ${{ env.PUBLIC_HOST }}
          BUILD_ID: ${{ env.BUILD_ID }}
        run: |
          set -Eeuo pipefail

          curl --fail --silent --show-error --dump-header /tmp/build.headers "http://${PUBLIC_HOST}/build-info.json?b=${BUILD_ID}" > /tmp/build-info.json
          curl --fail --silent --show-error --dump-header /tmp/health.headers "http://${PUBLIC_HOST}/api/health?b=${BUILD_ID}" > /tmp/health.json

          python3 - <<'PY'
          import json
          import os

          expected = os.environ["EXPECTED_COMMIT"]
          expected_short = expected[:12]

          with open('/tmp/build-info.json', 'r', encoding='utf-8') as f:
              build_raw = f.read()
          with open('/tmp/health.json', 'r', encoding='utf-8') as f:
              health_raw = f.read()

          try:
              build = json.loads(build_raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"build-info.json invalido (esperado JSON). Erro: {exc}; inicio do corpo: {build_raw[:180]!r}")

          try:
              health = json.loads(health_raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"/api/health invalido (esperado JSON). Erro: {exc}; inicio do corpo: {health_raw[:180]!r}")

          build_commit = str(build.get('git_commit', ''))
          health_commit = str(health.get('git_commit', ''))

          if expected_short not in build_commit and expected not in build_commit:
              raise SystemExit(f"Build publico desatualizado. Esperado {expected_short} ou {expected}, recebido {build_commit}")

          if expected_short not in health_commit and expected not in health_commit:
              raise SystemExit(f"Backend publico desatualizado. Esperado {expected_short} ou {expected}, recebido {health_commit}")

          print('Public rollout verified')
          PY

      - name: Collect Deployment Diagnostics
        if: always()
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_BACKEND_SERVICE: ${{ secrets.VPS_BACKEND_SERVICE || 'smartbling-backend' }}
          VPS_FRONTEND_DIR: ${{ secrets.VPS_FRONTEND_DIR || '/usr/share/nginx/html' }}
          PUBLIC_HOST: ${{ env.PUBLIC_HOST }}
        run: |
          set +e

          echo "=== PUBLIC ENDPOINTS ==="
          curl -i --max-time 12 "http://${PUBLIC_HOST}/build-info.json" | sed -n '1,25p'
          echo
          curl -i --max-time 12 "http://${PUBLIC_HOST}/api/health" | sed -n '1,30p'
          echo

          echo "=== VPS DIAGNOSTICS ==="
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' VPS_BACKEND_SERVICE='$VPS_BACKEND_SERVICE' VPS_FRONTEND_DIR='$VPS_FRONTEND_DIR' PUBLIC_HOST='$PUBLIC_HOST' bash -se" <<'REMOTE_DIAG'
          set +e
          APP_DIR="${VPS_APP_DIR:-/opt/smartB}"
          BACKEND_SERVICE="${VPS_BACKEND_SERVICE:-smartbling-backend}"
          FRONTEND_TARGET_DIR="${VPS_FRONTEND_DIR:-/usr/share/nginx/html}"

          echo "APP_DIR=$APP_DIR"
          echo "FRONTEND_TARGET_DIR=$FRONTEND_TARGET_DIR"
          echo "PUBLIC_HOST=${PUBLIC_HOST:-unset}"

          echo "--- server identity ---"
          hostname || true
          hostname -I || true
          curl -s --max-time 8 https://api.ipify.org || true
          echo

          echo "--- systemd status ---"
          systemctl status "$BACKEND_SERVICE" --no-pager -n 40 || true

          echo "--- systemd unit ---"
          systemctl cat "$BACKEND_SERVICE" || true

          echo "--- backend env summary ---"
          if [ -f "$APP_DIR/backend/.env" ]; then
            grep -E '^(DATABASE_URL|CORS_ORIGINS|GIT_COMMIT|BUILD_ID|BUILD_TIMESTAMP)=' "$APP_DIR/backend/.env" || true
          else
            echo "backend/.env not found"
          fi

          echo "--- local backend health ---"
          curl -i --max-time 8 "http://127.0.0.1:8000/health" | sed -n '1,30p' || true

          echo "--- frontend files (target) ---"
          ls -la "$FRONTEND_TARGET_DIR" | sed -n '1,40p' || true

          echo "--- build-info at target ---"
          if [ -f "$FRONTEND_TARGET_DIR/build-info.json" ]; then
            cat "$FRONTEND_TARGET_DIR/build-info.json"
          else
            echo "build-info.json not found in target"
          fi

          echo "--- nginx roots ---"
          nginx -T 2>/dev/null | sed -n 's/^[[:space:]]*root[[:space:]]\+\([^;][^;]*\);/root: \1/p' | sort -u || true

          echo "--- nginx active server blocks (listen/server_name/root/proxy_pass) ---"
          nginx -T 2>/dev/null | grep -E 'listen|server_name|root|proxy_pass' | sed -n '1,200p' || true

          echo "--- smartbling-public.conf ---"
          cat /etc/nginx/conf.d/smartbling-public.conf 2>/dev/null || echo "smartbling-public.conf not found"

          echo "--- localhost nginx build-info ---"
          curl -i --max-time 8 "http://127.0.0.1/build-info.json" | sed -n '1,25p' || true

          echo "--- public host from VPS ---"
          if [ -n "${PUBLIC_HOST:-}" ]; then
            curl -i --max-time 8 "http://${PUBLIC_HOST}/build-info.json" | sed -n '1,25p' || true
            curl -i --max-time 8 "http://${PUBLIC_HOST}/api/health" | sed -n '1,25p' || true
          fi
          REMOTE_DIAG
