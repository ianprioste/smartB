name: Deploy Production (production)

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare SSH key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh

          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Secret VPS_SSH_KEY vazio"
            exit 1
          fi

          KEY_RAW="$VPS_SSH_KEY"

          # Remove optional surrounding quotes added accidentally when copying secrets.
          if [[ ${KEY_RAW:0:1} == '"' && ${KEY_RAW: -1} == '"' ]]; then
            KEY_RAW="${KEY_RAW:1:${#KEY_RAW}-2}"
          fi
          if [[ ${KEY_RAW:0:1} == "'" && ${KEY_RAW: -1} == "'" ]]; then
            KEY_RAW="${KEY_RAW:1:${#KEY_RAW}-2}"
          fi

          KEY_OK=0

          # Try 1: secret already in proper multiline format.
          printf '%s' "$KEY_RAW" > ~/.ssh/deploy_key
          sed -i 's/\r$//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            KEY_OK=1
          fi

          # Try 2: secret pasted as single line with escaped newlines.
          if [ "$KEY_OK" -eq 0 ]; then
            printf '%b' "$KEY_RAW" > ~/.ssh/deploy_key
            sed -i 's/\r$//' ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
              KEY_OK=1
            fi
          fi

          # Try 3: secret stored as base64 of private key content.
          if [ "$KEY_OK" -eq 0 ]; then
            if printf '%s' "$KEY_RAW" | base64 -d > ~/.ssh/deploy_key 2>/dev/null; then
              sed -i 's/\r$//' ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
              if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
                KEY_OK=1
              fi
            fi
          fi

          if [ "$KEY_OK" -eq 0 ]; then
            echo "VPS_SSH_KEY invalida: use a chave privada completa (BEGIN/END), sem markdown e sem senha."
            exit 1
          fi

          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_BACKEND_SERVICE: ${{ secrets.VPS_BACKEND_SERVICE || 'smartbling-backend' }}
          VPS_REPO_URL: ${{ secrets.VPS_REPO_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' VPS_BACKEND_SERVICE='$VPS_BACKEND_SERVICE' VPS_REPO_URL='$VPS_REPO_URL' GITHUB_REPOSITORY='$GITHUB_REPOSITORY' bash -se" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail
          APP_DIR="${VPS_APP_DIR:-}"
          BACKEND_SERVICE="${VPS_BACKEND_SERVICE:-smartbling-backend}"
          DEPLOY_BRANCH="production"

          # Secrets can accidentally contain leading/trailing spaces.
          APP_DIR="$(printf '%s' "$APP_DIR" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          # Fallback: if VPS_APP_DIR is missing/invalid, try to locate the repo dir automatically.
          if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
            APP_DIR="$(find /opt /var/www /srv /home -maxdepth 4 -type d \( -name 'smartB' -o -name 'smartbling' -o -name 'smartBling' \) 2>/dev/null | head -n 1 || true)"
          fi

          if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR" ]; then
            echo "VPS_APP_DIR invalido e pasta do projeto nao encontrada automaticamente"
            echo "Defina o secret VPS_APP_DIR com caminho absoluto, ex: /opt/smartB"
            exit 1
          fi

          REPO_URL="${VPS_REPO_URL:-}"
          if [ -z "$REPO_URL" ]; then
            REPO_URL="git@github.com:${GITHUB_REPOSITORY}.git"
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Diretorio nao encontrado. Clonando repositorio..."
            mkdir -p "$APP_DIR"
            git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"

          if [ -n "$(git status --porcelain)" ]; then
            git stash push -u -m "auto-stash before deploy $(date '+%Y-%m-%d %H:%M:%S')"
          fi

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"

          if [ ! -d .venv ]; then
            if ! python3 -m venv .venv; then
              echo "python3 -m venv falhou; tentando instalar pacote venv do sistema..."
              if command -v apt-get >/dev/null 2>&1; then
                export DEBIAN_FRONTEND=noninteractive
                PY_MM="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
                apt-get update
                apt-get install -y "python${PY_MM}-venv" python3-venv || apt-get install -y python3-venv
                python3 -m venv .venv
              else
                echo "Nao foi possivel criar venv e apt-get nao esta disponivel para instalar dependencias do sistema."
                exit 1
              fi
            fi
          fi

          ./.venv/bin/pip install -r backend/requirements.txt

          cd frontend
          npm ci
          npm run build
          cd ..

          if command -v systemctl >/dev/null 2>&1; then
            systemctl restart "$BACKEND_SERVICE" || true
            systemctl reload nginx || true
          fi

          curl --fail --retry 5 --retry-delay 3 http://127.0.0.1:8000/health
          REMOTE_SCRIPT
